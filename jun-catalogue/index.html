<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Clock Image Library</title>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f5f5f5
      }

      .header {
        background: #222;
        color: #fff;
        padding: 15px;
        text-align: center
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px
      }

      .card,
      .imgcard {
        background: #fff;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .1)
      }

      button {
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 5px;
        background: #0d6efd;
        color: #fff;
        cursor: pointer
      }

      img {
        width: 100%;
        height: 220px;
        object-fit: contain
      }

      #gallery {
        display: none;
        padding: 20px
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>Clock Image Library</h2>
    </div>
    <div id="folders" class="grid"></div>
    <div id="gallery">
      <button onclick="back()">Back</button>
      <h3 id="title"></h3>
      <div id="imgs" class="grid"></div>
    </div>
    <script>
      const data = {
        "9inch-3D-ak": ["01.jpg", "02.jpg", "03.jpg", "04.jpg", "05.png"],
        "9inch-3D-khatu-shayam-baba": ["01.png", "02.jpg", "03.jpg", "04.jpg"],
        "10inch-Golden-Makka": ["01.png", "02.jpg", "03.jpg", "04.jpg", "05.png"],
        "10inch-silver-makka": ["01.jpg", "02.jpg", "03.png", "04.png"],
        "12inch-vintage-roman-green": ["01.png", "02.png", "03.png", "04.png", "05.jpg"],
        "12inch-vintage-roman-pink": ["01.png", "02.png", "03.png", "04.jpg"],
        "12inch-vintage-roman-royal-blue": ["01.png", "02.png", "03.png", "04.png", "05.jpg"],
        "Vintage-Roman-12inch-Orange": ["01.png", "02.png", "03.png", "04.png", "05.png", "06.png"],
        "Mahakal": ["01.png", "02.png", "03.png", "04.png", "05.jpg"],
        "Roya-guitar-golden": ["01.png", "02.png", "03.png", "04.png", "05.png", "06.jpg"],
        "Royal-Guitar-Frame-copper": ["01.png", "02.png", "03.jpg", "04.png", "05.png"],
        "Royal-guitar-silver": ["01.png", "02.png", "03.png", "04.png", "05.png", "06.jpg"],
        "Royal-guitar-wood": ["01.png", "02.png", "03.png", "04.png", "05.png", "06.jpg"],
        "Royal-Peacock-copper": ["01.png", "02.png", "03.png", "04.png", "05.jpg"],
        "Royal-peacock-golden": ["01.png", "02.png", "03.png", "04.png", "05.png", "06.jpg"],
        "Royal-peacock-silver": ["01.png", "02.png", "03.png", "04.png", "05.jpg"],
        "Royal-peacock-wood": ["01.png", "02.png", "03.png", "04.png", "05.jpg"],
        "Premium-Oxy-copper-Horse": ["01.png", "02.png", "03.png", "04.jpg"],
        "Premium-horse-red": ["01.png", "02.jpg", "03.png"],
        "Premium-wooden-horse": ["01.png", "02.png", "03.jpg", "04.png"],
        "Royal-premium-Horse-silver": ["01.jpg", "02.png", "03.png", "04.png", "05.png"],
        "horse-cherry": ["01.png", "02.jpg", "03.png", "04.png"],
        "horse-golden": ["01.png", "02.png", "03.jpg", "04.png"]
      };
      const root = "images/";
      const folders = document.getElementById('folders');
      for (let f in data) {
        folders.innerHTML += `
          <div class="card">
            <h3>${f}</h3>
            <button onclick="openFolder('${f}')">Open</button>
          </div>`;
      }

      function openFolder(f) {

    document.getElementById('title').innerText = f;
    folders.style.display = 'none';
    gallery.style.display = 'block';

    let h = '';

    data[f].forEach(img => {

        // Current page path detect karega
        let basePath = window.location.pathname.replace(/\/$/, '');

        // Correct image URL banega
        let imagePath = `${root}${f}/${img}`;
        let url = window.location.origin + basePath + '/' + imagePath;

        h += `
        <div class="imgcard">
            <img src="${imagePath}" alt="${img}">
            <button onclick="copyUrl('${url}')">
                Copy URL
            </button>
        </div>`;
    });

    imgs.innerHTML = h;
}

function copyUrl(url) {
    navigator.clipboard.writeText(url);
    alert('URL Copied:\n' + url);
}

function back() {
    gallery.style.display = 'none';
    folders.style.display = 'grid';
}

      function back() {
        gallery.style.display = 'none';
        folders.style.display = 'grid';
      }
    </script>
  </body>
</html>
